enable
configure terminal
hostname SW1
no ip domain-lookup
no ip cef

vlan 10
 name LAN_INTERNA

interface GigabitEthernet0/0
 description HACIA-R1-Gi0/1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown

interface GigabitEthernet0/1
 description HACIA-PC-LAN
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown

end
wr
